#Название сборки, отображается в github actions
name: NarvaOnline Framework CI

#Типы событий, при которых запускается workflow
#Именно в указанной ветке
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # запуск вручную из GitHub UI

#джоба, их может быть несколько
jobs:
#название джобы
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # force switch to node 24 version

    steps:
      # ─── 1. Получаем код ───────────────────────────────────────────
      - name: Checkout repository
        #uses: actions/checkout@v4
        uses: actions/checkout@v6

      # ─── 2. Java 21 ────────────────────────────────────────────────
      - name: Set up JDK 21
        #uses: actions/setup-java@v4
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle          # кэшируем ~/.m2 между запусками
          #cache: maven          # кэшируем ~/.m2 между запусками

      # ─── 3. Браузер для Selenide ───────────────────────────────────
      - name: Set up Chrome
        #uses: browser-actions/setup-chrome@v1
        uses: browser-actions/setup-chrome@latest

      # ─── 4. Разрешение для gradle ──────────────────────────────────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── 5. Запуск тестов ──────────────────────────────────────────
      - name: Run tests
        continue-on-error: true   # ← чтобы allure шаги выполнились даже при падении
        env:
          # Secrets — чувствительные данные
          USER_NAME:    ${{ secrets.USER_NAME }}
          PASSWORD:     ${{ secrets.PASSWORD }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          # Variables — конфигурация окружения
          BASE_URL:         ${{ vars.BASE_URL }}
          BASE_URL_API:     ${{ vars.BASE_URL_API }}
          BROWSER_HEADLESS: ${{ vars.BROWSER_HEADLESS }}
        run: ./gradlew clean test
                -Dselenide.headless=true
                -Dselenide.browser=chrome
                -Dchromeoptions.args=--no-sandbox,--disable-dev-shm-usage

      # ─── 6. Allure: генерируем отчёт ──────────────────────────────
      - name: Get Allure history
        #uses: actions/checkout@v4
        uses: actions/checkout@v6
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: build/allure-results
          gh_pages: gh-pages          # ← откуда берём историю
          allure_history: allure-history  # ← куда пишем новый отчёт
          keep_reports: 20      # ← храним 20 отчётов, установить на 1, если не нужно хранить историю

      # ─── 7. Публикуем отчёт на GitHub Pages ───────────────────────
      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true
          #force_orphan: true     # ← каждый раз перезаписывает ветку gh-pages

      # ─── 8. Сохраняем артефакты (даже при падении тестов) ─────────
      - name: Upload Allure results (raw)
        #uses: actions/upload-artifact@v4
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-results
          path: build/allure-results
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Allure report (HTML)
        #uses: actions/upload-artifact@v4
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 7