#The name of the build, displayed in GitHub actions
name: NarvaOnline Framework CI

#Event types that trigger workflow in the specified branches
on:
  #push:
    #branches: [ main, master, develop ]
  #pull_request:
    #branches: [ main, master ]
  workflow_dispatch:        # Launch manually from the GitHub UI

#Joba, there may be several of them
jobs:
#job name
  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # force switch to node 24 version

    steps:
      # ─── 1. Getting the code ───────────────────
      - name: Checkout repository
        uses: actions/checkout@v6      # ← updated version, switch from v4

      # ─── 2. Java 21 ────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0      # ← updated version, switch from v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle          # ← caching ~/.m2 between launches
          #cache: maven          # ←  caching ~/.m2 between launches

      # ─── 3. Browser for Selenide ──────────────────
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@latest        # ← updated version, switch from v1

      # ─── 4. Permission for gradle ───────────────
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # ─── 5. Launching tests ───────────────
      - name: Run tests
        continue-on-error: true   # ← for allure steps are executed even if tests fail
        env:
          # Secrets — sensitive data
          USER_NAME:    ${{ secrets.USER_NAME }}
          PASSWORD:     ${{ secrets.PASSWORD }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          # Variables — environment configuration
          BASE_URL:         ${{ vars.BASE_URL }}
          BASE_URL_API:     ${{ vars.BASE_URL_API }}
          BROWSER_HEADLESS: ${{ vars.BROWSER_HEADLESS }}
        run: ./gradlew clean test
                -Dselenide.headless=true
                -Dselenide.browser=chrome
                -Dchromeoptions.args=--no-sandbox,--disable-dev-shm-usage

      # ─── 6. Allure: generating a report ──────────
      - name: Get Allure history
        uses: actions/checkout@v6       # ← updated version, switch from v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: build/allure-results
          gh_pages: gh-pages          # ← this is where we take the history
          allure_history: allure-history  # ← here we write a new
          keep_reports: 20      # ← store 20 reports, set to 1 if you don't need to store history

      # ─── 7. Publish the report on GitHub Pages ──────
      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history
          keep_files: true
          #force_orphan: true     # ← each time overwrites the gh-pages branch

      # ─── 8. Saving artifacts (even when tests fail) ───
      - name: Upload Allure results (raw)
        uses: actions/upload-artifact@v7       # ← updated version, switch from v4
        if: always()
        with:
          name: allure-results
          path: build/allure-results
          retention-days: 7
          if-no-files-found: warn

      - name: Upload Allure report (HTML)
        uses: actions/upload-artifact@v7       # ← updated version, switch from v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 7