#Название сборки, отображается в github actions
name: NarvaOnline Framework CI

#Типы событий, при которых запускается workflow
#Именно в указанной ветке
on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:        # запуск вручную из GitHub UI

#джоба, их может быть несколько
jobs:
#название джобы
  tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Получаем код ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. Java 21 ────────────────────────────────────────────────
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle          # кэшируем ~/.m2 между запусками
          #cache: maven          # кэшируем ~/.m2 между запусками

      # ─── 3. Браузер для Selenide ───────────────────────────────────
      - name: Set up Chrome
        uses: browser-actions/setup-chrome@v1

      # ─── 4. Запуск тестов ──────────────────────────────────────────
      - name: Run tests
        env:
          # Secrets — чувствительные данные
          USER_NAME:    ${{ secrets.USER_NAME }}
          PASSWORD:     ${{ secrets.PASSWORD }}
          APP_PASSWORD: ${{ secrets.APP_PASSWORD }}
          # Variables — конфигурация окружения
          BASE_URL:         ${{ vars.BASE_URL }}
          BASE_URL_API:     ${{ vars.BASE_URL_API }}
          BROWSER_HEADLESS: ${{ vars.BROWSER_HEADLESS }}
        #run: mvn clean test -B
        run: ./gradlew clean test

      # ─── 5. Allure: генерируем отчёт ──────────────────────────────
      - name: Get Allure history
        uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Generate Allure report
        #uses: simple-elf/allure-report-action@v1.7
        #uses: simple-elf/allure-report-action@v1.9
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: target/allure-results
          allure_history: gh-pages
          keep_reports: 20

      # ─── 6. Публикуем отчёт на GitHub Pages ───────────────────────
      - name: Publish Allure report to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # ─── 7. Сохраняем артефакты (даже при падении тестов) ─────────
      - name: Upload Allure results (raw)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: target/allure-results
          retention-days: 7

      - name: Upload Allure report (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report
          path: allure-report
          retention-days: 7